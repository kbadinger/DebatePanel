name: Weekly Model Discovery

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  discover-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run model discovery scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          npm run scan-models --generate > discovery-report.txt
          cat discovery-report.txt

      - name: Check for new models or deprecations
        id: check_changes
        run: |
          # Check if new models were discovered
          if grep -q "NEW MODELS DISCOVERED" discovery-report.txt; then
            echo "new_models=true" >> $GITHUB_OUTPUT
            echo "✅ New models found!"
          else
            echo "new_models=false" >> $GITHUB_OUTPUT
          fi

          # Check if deprecated models need retirement
          if grep -q "DEPRECATED MODELS" discovery-report.txt; then
            echo "deprecated_models=true" >> $GITHUB_OUTPUT
            echo "⚠️ Deprecated models found!"
          else
            echo "deprecated_models=false" >> $GITHUB_OUTPUT
          fi

          # Create PR if either condition is true
          if [ "$new_models" = "true" ] || [ "$deprecated_models" = "true" ]; then
            echo "needs_pr=true" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=false" >> $GITHUB_OUTPUT
            echo "No changes needed"
          fi

      - name: Create Pull Request
        if: steps.check_new_models.outputs.new_models == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: Add newly discovered AI models"
          branch: model-discovery-${{ github.run_number }}
          title: "🆕 New AI Models Discovered"
          body: |
            ## 🤖 Automated Model Discovery

            This PR was automatically created by the model discovery workflow.

            ### What's New?

            New models were discovered from provider APIs. See the details below:

            ```
            $(cat discovery-report.txt)
            ```

            ### Manual Steps Required

            - [ ] Review new model IDs and display names
            - [ ] Add pricing information to `lib/models/pricing.ts`
            - [ ] Add model roles/strengths to `MODEL_ROLES` in `config.ts`
            - [ ] Add context limits to `MODEL_CONTEXT_LIMITS`
            - [ ] Test new models in development environment
            - [ ] Update `LATEST_MODELS_STATUS.md` with new models

            ### Configuration Code

            The generated configuration code has been saved to `model-updates.ts`.
            Copy the relevant sections to your configuration files.

            ---

            🤖 This PR was generated automatically by GitHub Actions
          labels: |
            models
            automated
            needs-review

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: model-discovery-report
          path: |
            discovery-report.txt
            model-updates.ts
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Model discovery failed. Check the logs for details."