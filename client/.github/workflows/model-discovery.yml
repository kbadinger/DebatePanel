name: Weekly Model Discovery

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  discover-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run OpenRouter model discovery
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          npm run discover-models -- --openrouter --update > discovery-report.txt 2>&1 || true
          cat discovery-report.txt

      - name: Check for generated config files
        id: check_changes
        run: |
          # Check if config was generated
          if [ -d "generated" ] && ls generated/model-updates-*.ts 1> /dev/null 2>&1; then
            echo "needs_pr=true" >> $GITHUB_OUTPUT
            echo "✅ New model configurations generated!"

            # Count new models
            LATEST_FILE=$(ls -t generated/model-updates-*.ts | head -1)
            NEW_COUNT=$(grep -c "withModelInfo" "$LATEST_FILE" || echo "0")
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
            echo "config_file=$LATEST_FILE" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=false" >> $GITHUB_OUTPUT
            echo "new_count=0" >> $GITHUB_OUTPUT
            echo "No model updates needed"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: Update AI models (new additions and deprecations)"
          branch: model-discovery-${{ github.run_number }}
          title: "🔄 AI Model Updates Detected"
          body: |
            ## 🤖 OpenRouter Model Discovery

            This PR was automatically created by the weekly model discovery workflow using OpenRouter.

            ### 📊 Discovery Summary

            - **Models Found**: ${{ steps.check_changes.outputs.new_count }} new/updated models
            - **Source**: OpenRouter API
            - **Generated Config**: `${{ steps.check_changes.outputs.config_file }}`

            ### 🔧 What's Included?

            The auto-generated configuration file includes:
            - ✅ Model definitions for `config.ts`
            - ✅ Pricing data for `pricing.ts` (with routing-aware markup)
            - ✅ Parameter schemas for `parameter-schemas.ts`
            - ✅ Routing recommendations (direct vs OpenRouter)

            ### 📋 Manual Review Required (~15 min)

            - [ ] Review the generated config file in `generated/`
            - [ ] Copy model definitions to appropriate tier in `config.ts`:
              - FEATURED_MODELS (flagship models shown by default)
              - EXPANDABLE_MODELS (shown on provider expansion)
              - SECONDARY_MODELS (shown under "Show all models")
            - [ ] Copy pricing entries to `pricing.ts`
            - [ ] Copy parameter schemas to `parameter-schemas.ts`
            - [ ] Assign model strengths/roles (if not auto-detected)
            - [ ] Test in development environment

            ### 🎯 Routing Strategy

            Models are classified as:
            - **Direct** (30% markup): Providers with direct API integration
            - **OpenRouter Mainstream** (40% markup): Major providers via OpenRouter
            - **OpenRouter Fringe** (50% markup): Niche models for fast time-to-market

            See `OPENROUTER_INTEGRATION.md` for full architecture details.

            ### 🚀 Deployment

            After merging, Vercel will auto-deploy. New models will be available immediately.

            ---

            🤖 Generated by GitHub Actions using OpenRouter API
            📖 See full discovery report in workflow artifacts
          labels: |
            models
            automated
            needs-review

      - name: Upload discovery report and generated config
        uses: actions/upload-artifact@v4
        with:
          name: model-discovery-report-${{ github.run_number }}
          path: |
            discovery-report.txt
            generated/*.ts
          retention-days: 30
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Model discovery failed. Check the logs for details."