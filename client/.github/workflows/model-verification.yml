name: Model Verification

on:
  pull_request:
    paths:
      - 'lib/models/**'
      - 'debate-panel/lib/models/**'
  workflow_dispatch:

jobs:
  verify-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify all configured models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          echo "Running model verification with API calls..."
          npm run scan-models --verify > verification-report.txt
          cat verification-report.txt

      - name: Check for errors
        id: check_errors
        run: |
          if grep -q "❌" verification-report.txt; then
            echo "errors=true" >> $GITHUB_OUTPUT
            echo "::warning::Some models failed verification"
          else
            echo "errors=false" >> $GITHUB_OUTPUT
            echo "✅ All models verified successfully"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('verification-report.txt', 'utf8');
            const hasErrors = process.env.ERRORS === 'true';

            const body = hasErrors
              ? `## ⚠️ Model Verification - Some Issues Found\n\n\`\`\`\n${report}\n\`\`\``
              : `## ✅ Model Verification - All Models OK\n\n\`\`\`\n${report}\n\`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          ERRORS: ${{ steps.check_errors.outputs.errors }}

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: model-verification-report
          path: verification-report.txt
          retention-days: 7